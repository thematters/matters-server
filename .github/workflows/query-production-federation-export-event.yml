name: Query Production Federation Export Event

on:
  workflow_dispatch:
    inputs:
      article_id:
        description: 'production article id to inspect'
        required: true
        type: string
      limit:
        description: 'Maximum rows to print'
        required: false
        default: '10'
        type: string
      include_decision_report:
        description: 'Print decision_report JSON for the selected article'
        required: false
        default: false
        type: boolean

concurrency:
  group: query-production-federation-export-event-${{ github.event.inputs.article_id }}
  cancel-in-progress: false

jobs:
  query:
    name: Query production federation export events
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10

    steps:
      - name: Validate input
        run: |
          case "${{ inputs.article_id }}" in
            ''|*[!0-9]*)
              echo "article_id must be a numeric production article id" >&2
              exit 1
              ;;
          esac

          case "${{ inputs.limit }}" in
            ''|*[!0-9]*)
              echo "limit must be numeric" >&2
              exit 1
              ;;
          esac

          if [ "${{ inputs.limit }}" -lt 1 ] || [ "${{ inputs.limit }}" -gt 20 ]; then
            echo "limit must be between 1 and 20" >&2
            exit 1
          fi

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn postgresql-client

      - name: Start production VPN
        run: |
          mkdir -p .github
          echo "$VPN_AUTH" | base64 -d > "$VPN_AUTH_PATH"
          echo "$VPN_CONFIG" | base64 -d > "$VPN_CONFIG_PATH"
          sudo openvpn --config "$VPN_CONFIG_PATH" --auth-user-pass "$VPN_AUTH_PATH" --daemon
          sleep 15s
        env:
          VPN_CONFIG: ${{ secrets.VPN_CONFIG }}
          VPN_CONFIG_PATH: '.github/config.ovpn'
          VPN_AUTH: ${{ secrets.VPN_AUTH }}
          VPN_AUTH_PATH: '.github/auth.txt'

      - name: Check production DB connection
        run: nc -zv -w 5 "$MATTERS_PG_HOST" 5432
        env:
          MATTERS_PG_HOST: ${{ secrets.PROD_PG_HOST }}

      - name: Query federation export event rows
        run: |
          if [ "${{ inputs.article_id }}" = "0" ]; then
            psql \
              --host "$MATTERS_PG_HOST" \
              --username "$MATTERS_PG_USER" \
              --dbname "$MATTERS_PG_DATABASE" \
              --no-password \
              --set ON_ERROR_STOP=1 \
              --command "
                with spam_threshold as (
                  select coalesce(
                    (
                      select value::numeric
                      from feature_flag
                      where name = 'spam_detection'
                        and flag = 'on'
                      order by updated_at desc
                      limit 1
                    ),
                    1
                  ) as threshold
                ),
                target_channel_patterns(pattern) as (
                  values ('還有'), ('性別'), ('生活事')
                ),
                target_channels as (
                  select
                    tc.id,
                    tc.name,
                    tc.short_hash,
                    tc.parent_id,
                    tc.enabled,
                    tc.provider_id,
                    tcp.pattern as requested_name
                  from topic_channel tc
                  join target_channel_patterns tcp
                    on tc.name ilike '%' || tcp.pattern || '%'
                    or tc.navbar_title ilike '%' || tcp.pattern || '%'
                ),
                channel_rows as (
                  select
                    target.requested_name,
                    target.short_hash as channel_short_hash,
                    target.parent_id as channel_parent_id,
                    target.enabled as channel_enabled,
                    target.provider_id as channel_provider_id,
                    tc.name as channel_name,
                    tca.article_id,
                    tca.enabled as channel_row_enabled,
                    tca.pinned,
                    tca.is_labeled,
                    tca.created_at as channel_created_at,
                    tca.updated_at as channel_updated_at,
                    a.short_hash,
                    a.title,
                    a.author_id,
                    a.is_spam,
                    a.spam_score,
                    a.state,
                    a.channel_enabled,
                    a.created_at as article_created_at,
                    st.threshold
                  from topic_channel_article tca
                  join topic_channel tc on tc.id = tca.channel_id
                  join article a on a.id = tca.article_id
                  cross join spam_threshold st
                  join target_channels target on target.id = tc.id
                  where tca.enabled = true
                    and a.state = 'active'
                    and a.channel_enabled = true
                ),
                metrics as (
                  select
                    requested_name,
                    channel_name,
                    channel_short_hash,
                    channel_enabled,
                    channel_provider_id,
                    count(*) as enabled_active_rows,
                    count(distinct article_id) as distinct_articles,
                    count(*) filter (
                      where article_created_at >= now() - interval '1 day'
                    ) as rows_1d,
                    count(*) filter (
                      where article_created_at >= now() - interval '3 days'
                    ) as rows_3d,
                    count(*) filter (
                      where article_created_at >= now() - interval '7 days'
                    ) as rows_7d,
                    count(*) filter (
                      where article_created_at >= now() - interval '30 days'
                    ) as rows_30d,
                    count(*) filter (
                      where is_spam is null
                        and spam_score >= threshold
                    ) as null_high_score_rows,
                    count(*) filter (
                      where is_spam is null
                        and spam_score >= threshold
                        and pinned = false
                    ) as null_high_score_unpinned_rows,
                    count(*) filter (
                      where is_spam is null
                        and spam_score >= threshold
                        and pinned = true
                    ) as null_high_score_pinned_rows,
                    count(*) filter (where is_spam = true) as is_spam_true_rows,
                    count(*) filter (
                      where is_spam = false
                        and spam_score >= threshold
                    ) as false_high_score_rows,
                    count(*) filter (
                      where article_created_at >= now() - interval '1 day'
                        and is_spam is null
                        and spam_score >= threshold
                    ) as null_high_score_rows_1d,
                    count(*) filter (
                      where article_created_at >= now() - interval '3 days'
                        and is_spam is null
                        and spam_score >= threshold
                    ) as null_high_score_rows_3d,
                    count(*) filter (
                      where article_created_at >= now() - interval '7 days'
                        and is_spam is null
                        and spam_score >= threshold
                    ) as null_high_score_rows_7d,
                    count(*) filter (
                      where article_created_at >= now() - interval '30 days'
                        and is_spam is null
                        and spam_score >= threshold
                    ) as null_high_score_rows_30d
                  from channel_rows
                  group by
                    requested_name,
                    channel_name,
                    channel_short_hash,
                    channel_enabled,
                    channel_provider_id
                ),
                sample_null_high_score as (
                  select
                    'null_high_score' as sample_type,
                    requested_name,
                    channel_name,
                    channel_short_hash,
                    article_id,
                    short_hash,
                    left(title, 80) as title_preview,
                    author_id,
                    is_spam,
                    spam_score,
                    threshold,
                    pinned,
                    is_labeled,
                    article_created_at,
                    channel_created_at,
                    channel_updated_at
                  from channel_rows
                  where is_spam is null
                    and spam_score >= threshold
                  order by article_created_at desc
                  limit 20
                ),
                sample_false_high_score as (
                  select
                    'false_high_score' as sample_type,
                    requested_name,
                    channel_name,
                    channel_short_hash,
                    article_id,
                    short_hash,
                    left(title, 80) as title_preview,
                    author_id,
                    is_spam,
                    spam_score,
                    threshold,
                    pinned,
                    is_labeled,
                    article_created_at,
                    channel_created_at,
                    channel_updated_at
                  from channel_rows
                  where is_spam = false
                    and spam_score >= threshold
                  order by article_created_at desc
                  limit 20
                ),
                samples as (
                  select * from sample_null_high_score
                  union all
                  select * from sample_false_high_score
                )
                select jsonb_pretty(
                  jsonb_build_object(
                    'threshold', (select threshold from spam_threshold),
                    'target_channels', coalesce(
                      (select jsonb_agg(to_jsonb(target_channels) order by requested_name, name) from target_channels),
                      '[]'::jsonb
                    ),
                    'metrics', coalesce(
                      (select jsonb_agg(to_jsonb(metrics) order by requested_name, channel_name) from metrics),
                      '[]'::jsonb
                    ),
                    'samples', coalesce(
                      (select jsonb_agg(to_jsonb(samples) order by sample_type, article_created_at desc) from samples),
                      '[]'::jsonb
                    )
                  )
                ) as topic_channel_spam_audit;
              "
            exit 0
          fi

          if [ "${{ inputs.include_decision_report }}" = "true" ]; then
            DECISION_REPORT_SQL='decision_report'
          else
            DECISION_REPORT_SQL="jsonb_build_object('redacted', true)"
          fi

          psql \
            --host "$MATTERS_PG_HOST" \
            --username "$MATTERS_PG_USER" \
            --dbname "$MATTERS_PG_DATABASE" \
            --no-password \
            --set ON_ERROR_STOP=1 \
            --command "
              select coalesce(jsonb_pretty(jsonb_agg(row_to_json(events)::jsonb)), '[]'::text) as federation_export_events
              from (
                select
                  id,
                  article_id,
                  actor_id,
                  trigger,
                  mode,
                  status,
                  eligible,
                  reason,
                  author_setting,
                  article_setting,
                  effective_article_setting,
                  $DECISION_REPORT_SQL as decision_report,
                  created_at
                from federation_export_event
                where article_id = ${{ inputs.article_id }}::bigint
                order by created_at desc
                limit ${{ inputs.limit }}::integer
              ) events;
            "
        env:
          MATTERS_PG_HOST: ${{ secrets.PROD_PG_HOST }}
          MATTERS_PG_DATABASE: ${{ secrets.PROD_PG_DATABASE }}
          MATTERS_PG_USER: ${{ secrets.PROD_PG_USER }}
          PGPASSWORD: ${{ secrets.PROD_PG_PASSWORD }}

      - name: Kill VPN
        if: always()
        run: sudo killall openvpn || true
