name: Create Release

on:
  push:
    branches:
      - main
      - master

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "current-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate CHANGELOG
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)
          {
            echo 'changelog<<EOF'
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG"..HEAD
            else
              git log --pretty=format:'- %s (%h)'
            fi
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ steps.version.outputs.current-version }}
          RELEASE_BODY: ${{ steps.changelog.outputs.changelog }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists; skipping creation."
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --target "$GITHUB_SHA" \
            --notes "$RELEASE_BODY"

      - name: Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          author_name: matters-server
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
