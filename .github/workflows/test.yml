name: Test

on:
  push:
    branches-ignore:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '18'
          - '24'
    uses: ./.github/workflows/build.yml
    with:
      environment: ''
      skip_tests: false
      skip_docker: true
      node_version: ${{ matrix.node-version }}
    secrets: {}
